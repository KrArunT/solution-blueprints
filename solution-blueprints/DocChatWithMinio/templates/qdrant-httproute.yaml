{{ if and .Values.qdrant.gatewayRoute.enabled (or (not .Values.qdrant.existingService) .Values.qdrant.fallback.enabled) }}
{{ $hostSuffix := regexReplaceAll "^[^.]+\\." .Values.gatewayRoute.host "" -}}
{{ $qdrantHost := .Values.qdrant.gatewayRoute.host | default (printf "%s-qdrant.%s" .Release.Name $hostSuffix) -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "aim-qdrant.release.fullname" . }}
  labels:
    {{- include "aimsb-talk-to-your-documents.labels" . | nindent 4 }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ .Values.qdrant.gatewayRoute.gateway.name }}
      namespace: {{ .Values.qdrant.gatewayRoute.gateway.namespace }}
  hostnames:
    - {{ $qdrantHost | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: {{ include "aim-qdrant.release.fullname" . }}
          port: {{ .Values.qdrant.deployment.ports.http }}
{{ end }}
