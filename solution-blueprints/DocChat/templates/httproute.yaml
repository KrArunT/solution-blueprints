{{- if .Values.gatewayRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "aimsb-talk-to-your-documents.fullname" . }}
  labels:
    {{- include "aimsb-talk-to-your-documents.labels" . | nindent 4 }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ .Values.gatewayRoute.gateway.name }}
      namespace: {{ .Values.gatewayRoute.gateway.namespace }}
  hostnames:
    - {{ .Values.gatewayRoute.host | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: {{ include "aimsb-talk-to-your-documents.fullname" . }}
          port: {{ .Values.service.port }}
{{- end }}
